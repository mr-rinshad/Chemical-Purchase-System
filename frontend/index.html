<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Chemical Purchase System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="public/css/style.css">

</head>

<body>

<div class="container">

    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-lg-4 col-md-6">

            <div class="card shadow">

                <div class="card-header text-center">

                    <h3>

                        Chemical Purchase System

                    </h3>

                </div>

                <div class="card-body">

                    <form id="loginForm">

                        <div class="mb-3">

                            <label class="form-label">

                                Login As

                            </label>

                            <select
                                id="role"
                                class="form-select">

                                <option value="user">

                                    User

                                </option>

                                <option value="laboratory">

                                    Laboratory

                                </option>

                                <option value="admin">

                                    Admin

                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Email

                            </label>

                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input
                                type="password"
                                id="password"
                                class="form-control"
                                required>

                        </div>

                        <div id="message"></div>

                        <button
                            class="btn btn-primary w-100"
                            type="submit">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="public/js/config.js"></script>
<script src="public/js/common.js"></script>
<script src="public/js/auth.js"></script>

</body>

</html>
