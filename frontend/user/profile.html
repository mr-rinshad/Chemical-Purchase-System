<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <a
            href="dashboard.html"
            class="navbar-brand">

            ← Dashboard

        </a>

        <button
            class="btn btn-light"
            onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h3>

                My Profile

            </h3>

        </div>

        <div class="card-body">

            <div id="message"></div>

            <form id="profileForm">

                <div class="mb-3">

                    <label class="form-label">

                        Full Name

                    </label>

                    <input
                        type="text"
                        id="full_name"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Email

                    </label>

                    <input
                        type="email"
                        id="email"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Phone

                    </label>

                    <input
                        type="text"
                        id="phone"
                        class="form-control"
                        required>

                </div>

                <div class="mt-3">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Update Profile

                    </button>

                </div>

            </form>

            <hr>

            <h4 class="mt-4">

                Change Password

            </h4>

            <form id="passwordForm">

                <div class="mb-3">

                    <label class="form-label">

                        Current Password

                    </label>

                    <input
                        type="password"
                        id="current_password"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        New Password

                    </label>

                    <input
                        type="password"
                        id="new_password"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Confirm New Password

                    </label>

                    <input
                        type="password"
                        id="confirm_password"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-warning">

                    Change Password

                </button>

            </form>

        </div>

    </div>

</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/user.js"></script>

</body>

</html>
