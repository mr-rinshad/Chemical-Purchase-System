<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Purchase Request</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <a href="dashboard.html"
           class="navbar-brand">

            ← Dashboard

        </a>

        <button
            class="btn btn-light"
            onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h3>

                Purchase Request

            </h3>

        </div>

        <div class="card-body">

            <div id="message"></div>

            <form id="purchaseForm">

                <div class="mb-3">

                    <label class="form-label">

                        Laboratory

                    </label>

                    <select
                        id="laboratory"
                        class="form-select"
                        required>

                        <option value="">

                            Select Laboratory

                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Chemical

                    </label>

                    <select
                        id="chemical"
                        class="form-select"
                        required>

                        <option value="">

                            Select Chemical

                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Authorization

                    </label>

                    <select
                        id="authorization"
                        class="form-select"
                        required>

                        <option value="">

                            Select Authorization

                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Quantity

                    </label>

                    <input
                        type="number"
                        id="quantity"
                        class="form-control"
                        min="1"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Purchase Mode

                    </label>

                    <select
                        id="purchase_mode"
                        class="form-select"
                        required>

                        <option value="">

                            Select Purchase Mode

                        </option>

                        <option value="Offline">

                            Offline

                        </option>

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Submit Purchase Request

                </button>

            </form>

        </div>

    </div>

</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/user.js"></script>

</body>

</html>
