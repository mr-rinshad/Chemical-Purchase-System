<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Purchase History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <a
            href="dashboard.html"
            class="navbar-brand">

            ← Dashboard

        </a>

        <button
            class="btn btn-light"
            onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<div class="container mt-4">

    <!-- Active Requests -->

    <div class="card shadow mb-4">

        <div class="card-header bg-warning">

            <h4>

                Active Purchase Requests

            </h4>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered">

                    <thead>

                        <tr>

                            <th>Request ID</th>

                            <th>Laboratory</th>

                            <th>Chemical</th>

                            <th>Quantity</th>

                            <th>Status</th>

                            <th>Reservation</th>

                            <th>Purchase Code</th>

                        </tr>

                    </thead>

                    <tbody id="purchaseRequestTable">

                        <tr>

                            <td colspan="7"
                                class="text-center">

                                Loading...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Completed Purchases -->

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h4>

                Completed Purchases

            </h4>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered">

                    <thead>

                        <tr>

                            <th>Purchase Code</th>

                            <th>Laboratory</th>

                            <th>Chemical</th>

                            <th>Quantity</th>

                            <th>Purchase Mode</th>

                            <th>Completed On</th>

                        </tr>

                    </thead>

                    <tbody id="purchaseHistoryTable">

                        <tr>

                            <td colspan="6"
                                class="text-center">

                                Loading...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/user.js"></script>

</body>

</html>
