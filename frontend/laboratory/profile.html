<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Laboratory Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <a href="main-dashboard.html"
           class="navbar-brand">

            ← Dashboard

        </a>

        <button
            class="btn btn-light"
            onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h3>

                Laboratory Profile

            </h3>

        </div>

        <div class="card-body">

            <div id="message"></div>

            <form id="profileForm">

                <div class="mb-3">

                    <label class="form-label">

                        License ID

                    </label>

                    <input
                        type="text"
                        id="license_id"
                        class="form-control"
                        readonly>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Laboratory Name

                    </label>

                    <input
                        type="text"
                        id="lab_name"
                        class="form-control"
                        readonly>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Email

                    </label>

                    <input
                        type="email"
                        id="email"
                        class="form-control"
                        readonly>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Phone

                    </label>

                    <input
                        type="text"
                        id="phone"
                        class="form-control"
                        readonly>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Address

                    </label>

                    <textarea
                        id="address"
                        class="form-control"
                        rows="2"
                        readonly></textarea>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            City

                        </label>

                        <input
                            type="text"
                            id="city"
                            class="form-control"
                            readonly>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            State

                        </label>

                        <input
                            type="text"
                            id="state"
                            class="form-control"
                            readonly>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Pincode

                        </label>

                        <input
                            type="text"
                            id="pincode"
                            class="form-control"
                            readonly>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Status

                    </label>

                    <input
                        type="text"
                        id="status"
                        class="form-control"
                        readonly>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/laboratory.js"></script>

</body>

</html>
