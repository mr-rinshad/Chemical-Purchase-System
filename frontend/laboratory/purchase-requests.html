<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Purchase Requests</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <a
            href="main-dashboard.html"
            class="navbar-brand">

            ← Dashboard

        </a>

        <button
            class="btn btn-light"
            onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h3>

                Purchase Requests

            </h3>

        </div>

        <div class="card-body">

            <div id="message"></div>

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h4>

                    Purchase Requests

                </h4>

                <button
                    id="updateReservationsBtn"
                    class="btn btn-warning">

                    Update Expired Reservations

                </button>

            </div>

            <div class="table-responsive">

                <table class="table table-bordered table-striped">

                    <thead class="table-primary">

                        <tr>

                            <th>User</th>

                            <th>Chemical</th>

                            <th>Quantity</th>

                            <th>Authorization</th>

                            <th>Purpose</th>

                            <th>Expiry</th>

                            <th>Purchase Mode</th>

                            <th>Status</th>

                            <th>Purchase Code</th>

                            <th>Request Date</th>

                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody id="purchaseRequestTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <div class="card mt-4">

        <div class="card-header">

            <h3>

                Complete Purchase

            </h3>

        </div>

        <div class="card-body">

            <form id="completePurchaseForm">

                <div class="row">

                    <div class="col-md-8">

                        <label>

                            Purchase Code

                        </label>

                        <input
                            type="text"
                            id="purchase_code"
                            class="form-control"
                            placeholder="Enter Purchase Code"
                            required>

                    </div>

                    <div class="col-md-4 d-flex align-items-end">

                        <button
                            class="btn btn-success w-100"
                            type="submit">

                            Complete Purchase

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/laboratory.js"></script>

</body>

</html>
