<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Chemical Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <a href="main-dashboard.html"
           class="navbar-brand">

            ← Dashboard

        </a>

        <button
            class="btn btn-light"
            onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h3>

                Chemical Management

            </h3>

        </div>

        <div class="card-body">

            <div id="message"></div>

            <h4 class="mb-3">

                Add Chemical

            </h4>

            <form id="chemicalForm">

                <input
                    type="hidden"
                    id="chemical_id">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Chemical Code

                        </label>

                        <input
                            type="text"
                            id="chemical_code"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Chemical Name

                        </label>

                        <input
                            type="text"
                            id="chemical_name"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Formula

                        </label>

                        <input
                            type="text"
                            id="formula"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Category

                        </label>

                        <input
                            type="text"
                            id="category"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Unit

                        </label>

                        <select
                            id="unit"
                            class="form-select"
                            required>

                            <option value="">

                                Select Unit

                            </option>

                            <option value="Kg">

                                Kg

                            </option>

                            <option value="Gram">

                                Gram

                            </option>

                            <option value="Litre">

                                Litre

                            </option>

                            <option value="ml">

                                ml

                            </option>

                            <option value="Bottle">

                                Bottle

                            </option>

                            <option value="Pack">

                                Pack

                            </option>

                        </select>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Price Per Unit

                        </label>

                        <input
                            type="number"
                            id="price_per_unit"
                            class="form-control"
                            step="0.01"
                            min="0"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Total Stock

                        </label>

                        <input
                            type="number"
                            id="total_stock"
                            class="form-control"
                            min="0"
                            required>

                    </div>

                </div>

                <button
                    type="submit"
                    id="saveChemicalBtn"
                    class="btn btn-primary">

                    Add Chemical

                </button>

                <button
                    type="button"
                    id="cancelEditBtn"
                    class="btn btn-secondary"
                    style="display:none;">

                    Cancel

                </button>

            </form>

        </div>

    </div>

    <div class="card shadow mt-4">

        <div class="card-header">

            <h3>

                My Chemicals

            </h3>

        </div>

        <div class="card-body">

            <div class="row mb-3">

                <div class="col-md-6">

                    <input

                        type="text"

                        id="searchKeyword"

                        class="form-control"

                        placeholder="Search by code, name, formula or category">

                </div>

                <div class="col-md-2">

                    <button

                        class="btn btn-primary w-100"

                        onclick="searchChemicals()">

                        Search

                    </button>

                </div>

                <div class="col-md-2">

                    <button

                        class="btn btn-secondary w-100"

                        onclick="loadChemicals()">

                        Show All

                    </button>

                </div>

            </div>
            <div class="row mb-3">

    <div class="col-md-3">

        <select
            id="filterCategory"
            class="form-select">

            <option value="">

                All Categories

            </option>

            <option value="Acid">

                Acid

            </option>

            <option value="Base">

                Base

            </option>

            <option value="Salt">

                Salt

            </option>

            <option value="Solvent">

                Solvent

            </option>

            <option value="Oxidizer">

                Oxidizer

            </option>

            <option value="Other">

                Other

            </option>

        </select>

    </div>


    <div class="col-md-3">

        <select
            id="filterStatus"
            class="form-select">

            <option value="">

                All Status

            </option>

            <option value="Available">

                Available

            </option>

            <option value="Out of Stock">

                Out of Stock

            </option>

        </select>

    </div>


    <div class="col-md-2">

        <button

            class="btn btn-success w-100"

            onclick="filterChemicals()">

            Filter

        </button>

    </div>


    <div class="col-md-2">

        <button

            class="btn btn-secondary w-100"

            onclick="clearFilters()">

            Clear

        </button>

    </div>

</div>

            <div class="table-responsive">

                <table class="table table-bordered table-striped">

                    <thead class="table-primary">

                        <tr>

                            <th>Chemical Name</th>

                            <th>Category</th>

                            <th>Total Stock</th>

                            <th>Reserved</th>

                            <th>Available</th>

                            <th>Status</th>

                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="chemicalTableBody">

                        <!-- Chemicals will be populated here -->

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/laboratory.js"></script>

</body>

</html>
