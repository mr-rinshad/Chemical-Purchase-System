<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Laboratory Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <span class="navbar-brand">

            Laboratory Dashboard

        </span>

        <button
            class="btn btn-light"
            onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow mb-4">

        <div class="card-body">

            <h3 id="welcome"></h3>

            <p>

                <strong>Email :</strong>

                <span id="email"></span>

            </p>

        </div>

    </div>

    <div class="row">

        <div class="col-md-3 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Total Chemicals</h5>

                    <h2 id="total_chemicals">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Available Chemicals</h5>

                    <h2 id="available_chemicals">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Out Of Stock</h5>

                    <h2 id="out_of_stock">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Total Stock</h5>

                    <h2 id="total_stock">0</h2>

                </div>

            </div>

        </div>

    </div>

    <div class="row">

        <div class="col-md-3 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Reserved Stock</h5>

                    <h2 id="reserved_stock">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Pending Requests</h5>

                    <h2 id="pending_requests">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Approved Requests</h5>

                    <h2 id="approved_requests">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Reserved Requests</h5>

                    <h2 id="reserved_requests">0</h2>

                </div>

            </div>

        </div>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Completed Purchases</h5>

                    <h2 id="completed_purchases">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-6 mb-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Expired Reservations</h5>

                    <h2 id="expired_reservations">0</h2>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/common.js"></script>
<script src="../public/js/laboratory.js"></script>

</body>

</html>
